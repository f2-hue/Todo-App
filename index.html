<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>Todo App</h1>

        <div class="input-section">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter task..."
            >

            <button id="addBtn">
                Add
            </button>
        </div>

        <p id="emptyState">
            No tasks yet
        </p>

        <ul id="taskList"></ul>

        <footer>

            <p>
                Remaining:
                <span id="remainingCount">0</span>
            </p>

            <button id="clearCompleted">
                Clear Completed
            </button>

        </footer>

    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
